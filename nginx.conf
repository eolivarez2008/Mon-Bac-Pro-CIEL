server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Routes propres sans rewrite
    location = /debouches   { try_files /pages/debouches.html =404; }
    location = /formation   { try_files /pages/formation.html =404; }
    location = /projets     { try_files /pages/projets.html =404; }
    location = /stages      { try_files /pages/stages.html =404; }
    location = /temoignages { try_files /pages/temoignages.html =404; }

    # Fallback général
    location / {
        try_files $uri $uri/ =404;
    }

    error_page 404 /404.html;

    location = /404.html {
        internal;
    }

    # Compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1000;

    # Cache assets statiques
    location ~* \.(css|js|png|jpg|jpeg|gif|svg|ico|webp|pdf)$ {
        expires 7d;
        add_header Cache-Control "public, no-transform";
    }
}