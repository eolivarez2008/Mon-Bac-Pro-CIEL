server {
    listen 80;
    root /usr/share/nginx/html/public; # On pointe directement dans /public
    index index.html;

    # Gestion du 404
    error_page 404 /404.html;

    # Rewrites pour des URLs propres (ex: mon-site.com/temoignages)
    location = /debouches   { rewrite ^ /pages/debouches.html break; }
    location = /formation   { rewrite ^ /pages/formation.html break; }
    location = /projets     { rewrite ^ /pages/projets.html break; }
    location = /stages      { rewrite ^ /pages/stages.html break; }
    location = /temoignages { rewrite ^ /pages/temoignages.html break; }

    # Redirection vers l'API Node.js
    # Tout ce qui commence par /api ira vers le container "api" sur le port 3000
    location /api/ {
        proxy_pass http://api:3000; 
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Servir les fichiers statiques
    location / {
        try_files $uri $uri/ /index.html;
    }
}