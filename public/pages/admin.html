<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Admin - Témoignages</title>
    <link rel="stylesheet" href="../styles/styles.css">
    <style>
        .admin-table { width: 90%; margin: 20px auto; border-collapse: collapse; background: white; color: black;}
        .admin-table th, .admin-table td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        .status-0 { background: #fff3cd; } /* En attente */
        .status-1 { background: #d4edda; } /* Validé */
        .status-2 { background: #f8d7da; } /* Bloqué */
        .btn { padding: 5px 10px; cursor: pointer; border: none; border-radius: 4px; color: white; margin-right: 5px;}
        .btn-ok { background: #28a745; }
        .btn-no { background: #ffc107; }
        .btn-del { background: #dc3545; }
    </style>
</head>
<body>
    <h1>Modération des Témoignages</h1>
    <table class="admin-table">
        <thead>
            <tr>
                <th>Nom</th>
                <th>Classe</th>
                <th>Message</th>
                <th>Statut</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="admin-list"></tbody>
    </table>

    <script>
        async function loadAll() {
            const res = await fetch('/api/admin/messages');
            const data = await res.json();
            const list = document.getElementById('admin-list');
            list.innerHTML = '';

            data.forEach(t => {
                const tr = document.createElement('tr');
                tr.className = `status-${t.approved}`;
                tr.innerHTML = `
                    <td>${t.firstname} ${t.lastname}</td>
                    <td>${t.classe}</td>
                    <td>${t.message}</td>
                    <td>${t.approved == 1 ? 'Validé' : (t.approved == 2 ? 'Bloqué' : 'En attente')}</td>
                    <td>
                        <button class="btn btn-ok" onclick="moderate(${t.id}, 'approve')">Valider</button>
                        <button class="btn btn-no" onclick="moderate(${t.id}, 'block')">Bloquer</button>
                        <button class="btn btn-del" onclick="moderate(${t.id}, 'delete')">Supprimer</button>
                    </td>
                `;
                list.appendChild(tr);
            });
        }

        async function moderate(id, action) {
            if(action === 'delete' && !confirm('Supprimer définitivement ?')) return;
            await fetch('/api/admin/moderate', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ id, action })
            });
            loadAll();
        }
        loadAll();
    </script>
</body>
</html>
