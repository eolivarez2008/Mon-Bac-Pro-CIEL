<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <link
      rel="icon"
      href="./assets/images/favicon.ico?v=2"
      type="image/x-icon"
    />
    <title>Bac Pro CIEL — Erreur 404</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/@mdi/font@7.4.47/css/materialdesignicons.min.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles/styles.css?v=5" />
    <script
      defer
      src="https://umami.eolivarez.site/script.js"
      data-website-id="ID_UMAMI_PROD"
    ></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script defer src="./scripts/components-loader.js?v=4"></script>
    <script defer src="./scripts/navbar.js?v=4"></script>
  </head>
  <body>
    <div id="navbar"></div>
    <main
      class="site-wrap d-flex align-items-center justify-content-center mt-5"
      style="min-height: 80vh"
    >
      <div class="container text-center mt-5">
        <div class="error-wrapper glass p-5 mx-auto" style="max-width: 600px">
          <div class="mb-4">
            <span
              class="mdi mdi-server-off text-accent"
              style="font-size: 5rem; opacity: 0.5"
            ></span>
          </div>
          <h1 class="display-1 fw-800 text-white mb-0">404</h1>
          <div class="badge-tech mb-4">Signal perdu / Host not found</div>
          <h2 class="h4 fw-600 mb-3">La page est introuvable</h2>
          <p class="hero-lead mb-5">
            Il semblerait que le lien que vous avez suivi soit rompu ou que la
            page ait été déplacée vers un autre nœud du réseau.
          </p>
          <div
            class="d-flex flex-column flex-md-row gap-3 justify-content-center"
          >
            <a
              href="/"
              class="btn-accent px-4"
              data-umami-event="BTN-404"
              data-umami-event-404="Home"
            >
              <span class="mdi mdi-home me-2"></span>Retour à l'accueil
            </a>
            <button
              onclick="history.back()"
              class="btn-accent px-4"
              data-umami-event="BTN-404"
              data-umami-event-404="Back"
            >
              <span class="mdi mdi-arrow-left me-2"></span>Page précédente
            </button>
          </div>
        </div>
      </div>
    </main>
    <div id="footer"></div>
  </body>
</html>
