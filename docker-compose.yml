version: '3.8'

services:
  frontend:
    build: .
    ports:
      - "3002:80"
    volumes:
      - ./public:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: always

  api:
    build: ./api
    ports:
      - "3003:3000"
    volumes:
      - ./api/database:/app/data # Pour ne pas perdre les messages au redémarrage
    restart: always